<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .wrap{
            width: 1200px;
            display: flex;
            /* 自動換行 */
            flex-wrap: wrap;
            /* 水平置中 */
            margin: 50px auto;
        }

        .item{
            width: 49%;
            /* 因為右邊界大，所以寬度要調整 */
            height: 400px;
            margin-right: 5px;
            margin-bottom: 5px;
            /* 相對定位起始點 */
            position: relative;
        }

        .item img{
            width: 100%;
            height: 100%;
            /* 自動調整比例 */
            object-fit: cover;           
        }

        /* 文字區 */
        .item .txt{
         background-color: rgba(0,0,0,0.5);
         color: #fff;
         
         position: absolute;
         top: 0;
         bottom: 0;
         left: 0;
         right: 0;

         display: flex;
         flex-direction: column;
         justify-content: center; /* 垂直置中 */
         align-items: center;     /* 水平置中 */

         /* 看不見 */
         opacity: 0;
        }

        /* 碰到item時，看得見文字區 */
        .item:hover .txt{
            opacity: 1;
        }

        .item .txt h2{
            color: yellow;
        }

        /* 線段：使用偽元素 */
        .item .txt h2::after{
            content: '';
            display: block;
            width: 0%;
            height: 3px;
            background-color: yellow;
            margin: 10px 0;
            transition: all .5s;
        }
        .item:hover .txt h2::after{
            width: 100%;
        }

    </style>
</head>
<body>
    <div class="wrap">
        <!--圖1-->
        <div class="item">
            <img src="images/01.jpg" alt="">
            <div class="txt">
                <h2>互動圖文卡片1</h2>
                <p>Lorem ipsum dolor sit amet.</p>
            </div>
        </div>
         <!--圖2-->
        <div class="item">
            <img src="images/02.jpg" alt="">
            <div class="txt">
                <h2>互動圖文卡片2</h2>
                <p>Lorem ipsum dolor sit amet.</p>
            </div>
        </div>
         <!--圖3-->
        <div class="item">
            <img src="images/03.jpg" alt="">
            <div class="txt">
                <h2>互動圖文卡片3</h2>
                <p>Lorem ipsum dolor sit amet.</p>
            </div>
        </div>
         <!--圖4-->
        <div class="item">
            <img src="images/05.jpg" alt="">
            <div class="txt">
                <h2>互動圖文卡片4</h2>
                <p>Lorem ipsum dolor sit amet.</p>
            </div>
        </div>
    </div>
</body>
</html>
